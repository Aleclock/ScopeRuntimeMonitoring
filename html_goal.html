<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panels UI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="pane">
            <div class="pane-header">
                <span class="pane-title">Parameters</span>
                <span class="pane-icon">::</span>
            </div>

            <div class="pane-body">
                <div class="control-row">
                    <label>color</label>
                    <div class="input-group color-input-group">
                        <div class="color-preview" style="background-color: hsl(230, 7%, 10%);"></div>
                        <input type="text" value="hsl(230, 7%, 10%)" readonly>
                    </div>
                </div>

                <div class="control-row">
                    <label>title</label>
                    <input type="text" value="Tweakpane" class="text-input">
                </div>

                <div class="tabs">
                    <div class="tab active">Layout</div>
                    <div class="tab">Presets</div>
                </div>

                <div class="control-row">
                    <label>spacing</label>
                    <div class="slider-group">
                        <input type="range" min="0" max="50" value="24" class="slider">
                        <span class="value-display">24.00</span>
                    </div>
                </div>

                <div class="control-row">
                    <label>range</label>
                    <div class="slider-group">
                        <input type="range" min="0" max="1" step="0.01" value="0.80" class="slider">
                        <span class="value-display">0.80</span>
                    </div>
                </div>

                <div class="control-row">
                    <label>maxSize</label>
                    <div class="slider-group">
                        <input type="range" min="0" max="100" value="70" class="slider">
                        <span class="value-display">70.00</span>
                    </div>
                </div>

                <div class="control-row">
                    <label>freq</label>
                    <div class="multi-input">
                        <button class="action-btn">+</button>
                        <span class="value-display bg-dark">17.00</span>
                        <span class="value-display bg-dark">6.30</span>
                    </div>
                </div>

                <div class="control-row">
                    <label>amp</label>
                    <div class="multi-input">
                        <button class="action-btn">+</button>
                        <span class="value-display bg-dark">0.10</span>
                        <span class="value-display bg-dark">0.50</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="pane leva-variant">
            <div class="pane-header header-leva">
                <span class="arrow-down">▼</span>
                <span class="drag-dots">:::</span>
                <span class="search-icon">🔍</span>
            </div>

            <div class="pane-body">
                <div class="control-row">
                    <label>first</label>
                    <div class="slider-group blue-variant">
                        <input type="range" min="-10" max="10" value="0" class="slider">
                        <span class="value-display numeric-box"><small>v</small> 0.00</span>
                    </div>
                </div>

                <div class="control-row">
                    <label>second</label>
                    <input type="text" value="Hello" class="text-input font-secondary">
                </div>

                <div class="control-row">
                    <label>foo</label>
                    <div class="select-wrapper">
                        <select class="text-input font-secondary">
                            <option>Bar</option>
                        </select>
                    </div>
                </div>

                <div class="control-row">
                    <label>aColor</label>
                    <div class="input-group color-input-group">
                        <div class="color-preview code-color-1"></div>
                        <input type="text" value="#ff005b" readonly class="font-secondary">
                    </div>
                </div>

                <div class="control-row">
                    <label>position</label>
                    <div class="vector-group">
                        <div class="vector-input"><span class="dim">x</span>0.00</div>
                        <div class="vector-input"><span class="dim">y</span>2.00</div>
                        <div class="vector-input"><span class="dim">z</span>12.00</div>
                    </div>
                </div>

                <div class="control-row">
                    <label>joystick</label>
                    <div class="joystick-group">
                        <div class="joystick-pad"><span class="joystick-dot"></span></div>
                        <div class="vector-input"><span class="dim">x</span>0.00</div>
                        <div class="vector-input"><span class="dim">y</span>1.00</div>
                    </div>
                </div>

                <hr class="pane-divider">

                <div class="folder">
                    <div class="folder-header">
                        <span class="arrow-down">▼</span> A Folder
                    </div>
                    <div class="folder-content">
                        <div class="control-row">
                            <label>anotherColor</label>
                            <div class="input-group color-input-group">
                                <div class="color-preview code-color-2"></div>
                                <input type="text" value="#f8d628" readonly class="font-secondary">
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>

</html>
